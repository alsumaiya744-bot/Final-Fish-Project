<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Fish Supply Chain - Login
    </title>

    <link rel="stylesheet"
          href="../static/css/login.css">
</head>

<body>

<div class="container">

   

    <div class="left-panel">

        <img
                src="/fishsupplychainmanagement/src/main/resources/static/images/companylogo.png"
                alt="Logo"
                class="logo">

        <h1>
           Al Sultan Seafood
        </h1>

        <p>
            Fresh Seafood,
            Fresh Every Day
        </p>

        <img
                src="/fishsupplychainmanagement/src/main/resources/static/images/companylogo.png"
                alt="Seafood"
                class="fish-image">

    </div>


  

    <div class="right-panel">

        <div class="login-box">

            <h2>
                Admin / User Login
            </h2>

            <form id="loginForm">

               

                <div class="input-group">

                    <label>
                        Email
                    </label>

                    <input
                            type="email"
                            id="email"
                            placeholder="Enter Email">

                </div>


                

                <div class="input-group">

                    <label>
                        Password
                    </label>

                    <div class="password-box">

                        <input
                                type="password"
                                id="password"
                                placeholder="Enter Password">

                        <span
                                id="showPassword">
                            Show
                        </span>

                    </div>

                </div>


               

                <div class="input-group">

                    <label>
                        Login As
                    </label>

                    <select id="role">

                        <option value="">
                            Select Role
                        </option>

                        <option value="ADMIN">
                            Admin
                        </option>

                        <option value="USER">
                            User
                        </option>

                    </select>

                </div>


                

                <button
                        type="submit"
                        class="login-btn">

                    Login

                </button>

            </form>


           

            <div class="links">

                <a href="register.html">
                    Create Account
                </a>

                <a href="forgot-password.html">
                    Forgot Password?
                </a>

            </div>

        </div>

    </div>

</div>

<script src="../static/js/login.js"></script>

</body>
</html>
