<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fish Catalog</title>

    <link rel="stylesheet"
          href="/fishsupplychainmanagement/src/main/resources/static/css/UserFishCatalog.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar">

    <div class="logo">
        🐟 Fish SCM
    </div>

    <ul>

        <li>
            <a href="UserHome.html">
                Home
            </a>
        </li>

        <li>
            <a href="UserFishCatalog.html"
               class="active">
                Fish Catalog
            </a>
        </li>

        <li>
            <a href="UserCart.html">
                Cart
            </a>
        </li>

        <li>
            <a href="UserMyOrder.html">
                My Orders
            </a>
        </li>

        <li>
            <a href="login.html">
                Logout
            </a>
        </li>

    </ul>

</nav>

<div class="container">

    <div class="page-header">

        <h1>
            🐟 Fish Catalog
        </h1>

        <p>
            Browse Fresh Seafood
        </p>

    </div>

    <!-- Search & Filter -->

    <div class="filter-section">

        <input type="text"
               id="search"
               placeholder="🔍 Search Fish">

        <select id="category">

            <option value="All">
                All Categories
            </option>

            <option value="Salt Water">
                Salt Water
            </option>

            <option value="Fresh Water">
                Fresh Water
            </option>

        </select>

        <select id="sort">

            <option value="">
                Sort By
            </option>

            <option value="low">
                Price Low To High
            </option>

            <option value="high">
                Price High To Low
            </option>

            <option value="name">
                Name A-Z
            </option>

        </select>

    </div>

    <!-- Fish Cards -->

    <div class="fish-cards"
         id="fishCards">

    </div>

</div>

<script src="js/config.js"></script>

<script src="js/auth.js"></script>

<script src="js/UserFishCatalog.js"></script>

</body>
</html>
