<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>User Home</title>

    <link rel="stylesheet"
          href="/fishsupplychainmanagement/src/main/resources/static/css/UserHome.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- Navbar -->

<nav class="navbar">

    <div class="logo">
        🐟 Fish SCM
    </div>

    <ul class="nav-links">

        <li>
            <a href="UserHome.html">
                <i class="fa-solid fa-house"></i>
                Home
            </a>
        </li>

        <li>
            <a href="UserFishCatalog.html">
                <i class="fa-solid fa-fish"></i>
                Fish Catalog
            </a>
        </li>
        <li>
    <a href="UserNotification.html">
        <i class="fa-solid fa-bell"></i>
        Notification
    </a>
</li>

        <li>
            <a href="UserCart.html">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </a>
        </li>

        <li>
            <a href="UserMyOrder.html">
                <i class="fa-solid fa-box"></i>
                My Orders
            </a>
        </li>
        

        

        <li>
    <a href="#"
       id="logoutBtn">

        <i class="fa-solid fa-right-from-bracket"></i>
        Logout

    </a>
</li>

    </ul>

</nav>

<div class="container">

    <!-- Welcome -->

    <div class="welcome">

        <h1>
            Welcome, User 👋
        </h1>

        <p>
            Fresh Seafood Delivered Every Day
        </p>

    </div>

    <!-- Summary Cards -->

    <div class="cards">

        <div class="card">

            <h3>Total Orders</h3>

            <p id="totalOrders">
                0
            </p>

        </div>

        <div class="card">

            <h3>Pending Orders</h3>

            <p id="pendingOrders">
                0
            </p>

        </div>

        <div class="card">

            <h3>Delivered Orders</h3>

            <p id="deliveredOrders">
                0
            </p>

        </div>

    </div>

    <!-- Search -->

    <div class="search-section">

        <input type="text"
               id="search"
               placeholder="🔍 Search Fish">

        <select id="category">

            <option value="All">
                All Categories
            </option>

            <option value="Salt Water">
                Salt Water
            </option>

            <option value="Fresh Water">
                Fresh Water
            </option>

        </select>

    </div>

    <!-- Featured Fish -->

    <div class="fish-section">

        <h2>
            Featured Fish
        </h2>

        <div id="fishCards"
             class="fish-cards">

        </div>

    </div>

   

</div>


<script src="js/config.js"></script>

<script src="js/auth.js"></script>
<script src="js/UserHome.js"></script>


</body>
</html>
