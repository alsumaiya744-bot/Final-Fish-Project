<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Create Account | Fish Supply Chain
    </title>

    <link rel="stylesheet"
          href="../static/css/register.css">
</head>

<body>

<div class="container">

    <!-- Left Panel -->

    <div class="left-panel">

        <img
                src="/fishsupplychainmanagement/src/main/resources/static/images/companylogo.png"
                alt="Logo"
                class="logo">

        <h1>
            Al Sultan Seafood
        </h1>

        <p>
            Fresh Seafood, Fresh Every Day
        </p>

        <img
                src="/fishsupplychainmanagement/src/main/resources/static/images/companylogo.png"
                alt="Seafood"
                class="fish-image">

    </div>


    

    <div class="right-panel">

        <h2>
            Create Account
        </h2>

        <form id="registerForm">

            

            <div class="input-group">

                <label>
                    Full Name
                </label>

                <input
                        type="text"
                        id="fullName"
                        placeholder="Enter Full Name">

            </div>


          

            <div class="input-group">

                <label>
                    Email
                </label>

                <input
                        type="email"
                        id="email"
                        placeholder="Enter Email">

            </div>


          

            <div class="input-group">

                <label>
                    Phone Number
                </label>

                <input
                        type="tel"
                        id="phone"
                        placeholder="Enter Phone Number">

            </div>


            <div class="input-group">

    <label>
        Address
    </label>

    <textarea
            id="address"
            placeholder="Enter Address">
    </textarea>

</div>


           

            <div class="input-group">

                <label>
                    User Type
                </label>

                <select id="customerType">

                    <option value="">
                        Select Type
                    </option>

                    <option value="RETAIL">
                        Retail
                    </option>

                    <option value="WHOLESALE">
                        Wholesale
                    </option>

                    <option value="HOTEL">
                        Hotel
                    </option>

                </select>

            </div>


           

            <div class="input-group">

                <label>
                    Password
                </label>

                <div class="password-box">

                    <input
                            type="password"
                            id="password"
                            placeholder="Enter Password">

                    <span
                            id="showPassword">
                        Show
                    </span>

                </div>

            </div>


            
            <div class="input-group">

                <label>
                    Confirm Password
                </label>

                <div class="password-box">

                    <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password">

                    <span
                            id="showConfirmPassword">
                        Show
                    </span>

                </div>

            </div>


           

            <input
                    type="hidden"
                    id="role"
                    value="USER">


            

            <button
                    type="submit">

                Create Account

            </button>


            

            <div class="links">

                <p>

                    Already have an account?

                    <a href="index.html">
                        Login
                    </a>

                </p>

            </div>

        </form>

    </div>

</div>

<script src="../static/js/register.js"></script>

</body>
</html>
